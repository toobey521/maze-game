<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>走迷宫-Toobey</title>
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

  :root {
    --bg: #08080f;
    --surface: #161020;
    --surface2: #1e1630;
    --border: #3a2848;
    --text: #f0e8f8;
    --textDim: #a090b0;
    --red: #ef4444;
    --redLight: #fca5a5;
    --redBright: #fecaca;
    --redGlow: rgba(239,68,68,.55);
    --redGlowSoft: rgba(239,68,68,.18);
    --redGlowDeep: rgba(239,68,68,.08);
    --orange: #f97316;
    --orangeGlow: rgba(249,115,22,.4);
    --pink: #ec4899;
    --pinkGlow: rgba(236,72,153,.35);
    --wall: #221830;
    --wallTop: #3a2850;
    --wallSide: #181020;
    --wallGlow: rgba(100,60,120,.15);
    --floor: #14101e;
    --floorAlt: #110e18;
    --trail: rgba(239,68,68,.18);
    --trailGlow: rgba(239,68,68,.08);
    --cell-size: 40px;
    --font: 'Segoe UI','SF Pro Display','PingFang SC','Microsoft YaHei',-apple-system,sans-serif;
  }

  html,body{height:100%;overflow-x:hidden}

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    display: flex;
    justify-content: center;
    align-items: center;
    -webkit-user-select: none;
    user-select: none;
    background-image:
      radial-gradient(ellipse 70% 50% at 50% 10%, rgba(239,68,68,.07) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 90%, rgba(249,115,22,.05) 0%, transparent 50%);
  }

  /* ── pages ── */
  .page { display: none; width: 100%; max-width: 720px; padding: 20px; flex-direction: column; align-items: center; gap: 18px; }
  .page.active { display: flex; }

  /* ═══════════════════════════════════════
     HOME PAGE
     ═══════════════════════════════════════ */
  .home-header { text-align: center; width: 100%; padding-top: 10px; }
  .home-header h1 {
    font-size: 38px; font-weight: 900;
    background: linear-gradient(135deg, var(--redBright), var(--red), var(--orange));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    letter-spacing: -.5px;
    filter: drop-shadow(0 0 20px var(--redGlowSoft));
  }
  .home-header .tagline {
    font-size: 13px; color: var(--textDim); margin-top: 6px;
    letter-spacing: 3px; text-transform: uppercase;
  }

  /* level grid */
  .level-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
    width: 100%;
    max-width: 520px;
  }
  .level-btn {
    aspect-ratio: 1;
    border: 2px solid var(--border);
    border-radius: 14px;
    background: var(--surface);
    color: var(--text);
    font-size: 18px;
    font-weight: 700;
    font-family: var(--font);
    cursor: pointer;
    transition: all .2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    position: relative;
    overflow: hidden;
  }
  .level-btn .lvl-num { font-size: 22px; line-height: 1; }
  .level-btn .lvl-label { font-size: 10px; color: var(--textDim); letter-spacing: .5px; }
  .level-btn::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(circle at 50% 50%, var(--redGlowSoft), transparent 70%);
    opacity: 0;
    transition: opacity .2s;
  }
  .level-btn:hover::before { opacity: 1; }
  .level-btn:hover {
    border-color: var(--red);
    color: #fff;
    transform: translateY(-3px);
    box-shadow: 0 6px 24px var(--redGlowSoft), 0 0 0 1px var(--red);
  }
  .level-btn:active { transform: scale(.95) translateY(0); }

  .level-btn.completed {
    border-color: var(--orange);
    background: linear-gradient(135deg, #1e1428, #2a1828);
  }
  .level-btn.completed::after {
    content: '✓';
    position: absolute; top: 4px; right: 6px;
    font-size: 12px; color: var(--orange);
  }

  /* difficulty legend */
  .legend {
    display: flex; gap: 16px; flex-wrap: wrap; justify-content: center;
    font-size: 11px; color: var(--textDim); margin-top: 4px;
  }
  .legend span { display: flex; align-items: center; gap: 4px; }
  .legend .dot {
    width: 10px; height: 10px; border-radius: 50%; display: inline-block;
  }

  /* ═══════════════════════════════════════
     GAME PAGE
     ═══════════════════════════════════════ */
  .game-header { text-align: center; width: 100%; }
  .game-header h1 {
    font-size: 22px; font-weight: 800;
    background: linear-gradient(135deg, var(--redLight), var(--orange));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }

  /* info bar */
  .info-bar {
    display: flex; justify-content: center; align-items: center; gap: 14px;
    font-size: 13px; color: var(--textDim); width: 100%; flex-wrap: wrap;
  }
  .info-item {
    display: flex; align-items: center; gap: 6px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 5px 14px;
  }
  .info-item .icon { font-size: 15px; }
  .info-item strong { color: var(--text); font-weight: 600; }
  .level-badge {
    background: linear-gradient(135deg, var(--red), var(--orange)) !important;
    border: none !important; color: #fff !important; font-weight: 700 !important;
    padding: 5px 16px !important; box-shadow: 0 2px 16px var(--redGlow);
  }

  /* board */
  .board-wrapper {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 12px;
    box-shadow: 0 10px 50px rgba(0,0,0,.5), 0 0 0 1px rgba(239,68,68,.1), 0 0 60px var(--redGlowDeep);
  }
  .board { display: grid; gap: 2px; position: relative; }

  /* cells */
  .cell {
    width: var(--cell-size); height: var(--cell-size);
    border-radius: 4px; position: relative;
    transition: background .12s;
  }
  .cell-wall {
    background: linear-gradient(145deg, var(--wallTop), var(--wall));
    box-shadow: inset 0 2px 0 #4a3860, inset 0 -2px 0 var(--wallSide),
                inset 1px 0 0 #4a3860, inset -1px 0 0 #100818,
                0 0 4px var(--wallGlow);
    border-radius: 4px;
  }
  .cell-floor { background: var(--floor); }
  .cell-floor-alt { background: var(--floorAlt); }
  .cell-trail {
    background: var(--trail);
    box-shadow: inset 0 0 8px var(--trailGlow);
  }

  /* start / exit */
  .cell-start::before {
    content: '🚩'; position: absolute; top: 50%; left: 50%;
    transform: translate(-50%,-50%); font-size: calc(var(--cell-size) * 0.45);
    z-index: 1; filter: drop-shadow(0 0 6px rgba(251,191,36,.6));
  }
  .cell-exit::after {
    content: '🏁'; position: absolute; top: 50%; left: 50%;
    transform: translate(-50%,-50%); font-size: calc(var(--cell-size) * 0.45);
    z-index: 1; filter: drop-shadow(0 0 6px rgba(52,211,153,.6));
    animation: exitPulse 2s ease-in-out infinite;
  }
  @keyframes exitPulse {
    0%,100% { transform: translate(-50%,-50%) scale(1); opacity: 1; }
    50% { transform: translate(-50%,-50%) scale(1.15); opacity: .85; }
  }

  /* player entity */
  .entity {
    position: absolute;
    width: var(--cell-size); height: var(--cell-size);
    display: flex; align-items: center; justify-content: center;
    transition: left .12s cubic-bezier(.34,1.56,.64,1), top .12s cubic-bezier(.34,1.56,.64,1);
    z-index: 10; pointer-events: none;
  }
  .entity-player {
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #fff0f0, var(--redBright), var(--red), #b91c1c);
    box-shadow: 0 0 24px var(--redGlow), 0 0 48px var(--redGlowSoft), 0 4px 16px rgba(0,0,0,.5);
    z-index: 12;
    animation: playerPulse 2s ease-in-out infinite;
  }
  @keyframes playerPulse {
    0%,100% {
      box-shadow: 0 0 20px var(--redGlow), 0 0 40px var(--redGlowSoft), 0 4px 16px rgba(0,0,0,.5);
    }
    50% {
      box-shadow: 0 0 32px var(--redGlow), 0 0 56px var(--redGlowSoft), 0 0 80px var(--redGlowDeep), 0 4px 16px rgba(0,0,0,.5);
    }
  }

  /* controls */
  .controls { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
  .controls button {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    padding: 8px 18px; border-radius: 10px; font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all .15s; font-family: var(--font);
    display: flex; align-items: center; gap: 5px;
  }
  .controls button:hover:not(:disabled) { background: var(--border); border-color: var(--red); color: #fff; transform: translateY(-1px); }
  .controls button:active:not(:disabled) { transform: scale(.96) translateY(0); }
  .controls button:disabled { opacity: .35; cursor: default; }
  .controls button.primary {
    background: linear-gradient(135deg, var(--red), var(--orange));
    border-color: var(--red); color: #fff; box-shadow: 0 2px 16px var(--redGlow);
  }
  .controls button.primary:hover:not(:disabled) { box-shadow: 0 4px 24px var(--redGlow); }

  /* d-pad */
  .dpad {
    display: grid; grid-template-columns: 58px 58px 58px; grid-template-rows: 58px 58px 58px;
    gap: 5px; margin-top: 4px;
  }
  .dpad button {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 12px;
    color: var(--text); font-size: 22px; cursor: pointer; transition: all .12s;
    display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }
  .dpad button:hover { border-color: var(--red); background: var(--border); }
  .dpad button:active { background: var(--red); transform: scale(.92); }
  .dpad-empty { visibility: hidden; }
  .dpad-up    { grid-column: 2; grid-row: 1; }
  .dpad-left  { grid-column: 1; grid-row: 2; }
  .dpad-right { grid-column: 3; grid-row: 2; }
  .dpad-down  { grid-column: 2; grid-row: 3; }

  /* home button in game */
  .home-btn {
    position: absolute; top: 16px; left: 16px; z-index: 50;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--textDim); width: 36px; height: 36px; border-radius: 10px;
    font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all .15s;
  }
  .home-btn:hover { border-color: var(--red); color: var(--text); transform: scale(1.05); }

  /* modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.65); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    z-index: 100; align-items: center; justify-content: center;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
    padding: 32px 40px; text-align: center; max-width: 360px; width: 90%;
    animation: modalIn .4s cubic-bezier(.34,1.56,.64,1);
    box-shadow: 0 24px 80px rgba(0,0,0,.6);
  }
  @keyframes modalIn {
    from { transform: scale(.8) translateY(30px); opacity: 0; }
    to   { transform: scale(1) translateY(0); opacity: 1; }
  }
  .modal .emoji { font-size: 48px; margin-bottom: 12px; }
  .modal h2 {
    font-size: 24px; margin-bottom: 6px;
    background: linear-gradient(135deg, var(--redLight), var(--orange));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .modal p { color: var(--textDim); margin-bottom: 18px; font-size: 14px; line-height: 1.5; }
  .modal .stats {
    display: flex; justify-content: center; gap: 24px; margin-bottom: 20px;
    padding: 12px; background: var(--surface2); border-radius: 12px;
  }
  .modal .stats div { text-align: center; }
  .modal .stats strong { display: block; font-size: 26px; color: var(--text); }
  .modal .stats span { font-size: 11px; color: var(--textDim); text-transform: uppercase; letter-spacing: .5px; }
  .modal button {
    padding: 10px 32px; border-radius: 12px; border: none; cursor: pointer;
    font-size: 15px; font-weight: 700;
    background: linear-gradient(135deg, var(--red), var(--orange)); color: #fff;
    box-shadow: 0 4px 20px var(--redGlow); transition: all .15s; font-family: var(--font);
  }
  .modal button:hover { transform: translateY(-2px); box-shadow: 0 6px 28px var(--redGlow); }

  /* confetti */
  #confetti-canvas { position: fixed; inset: 0; z-index: 101; pointer-events: none; }

  /* hint bar */
  .hint-bar {
    display: flex; justify-content: center; gap: 16px;
    font-size: 12px; color: var(--textDim); opacity: .7;
  }
  .hint-bar kbd {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 4px; padding: 1px 6px; font-family: var(--font); font-size: 11px;
  }

  /* responsive */
  @media (max-width: 520px) {
    :root { --cell-size: 32px; }
    .page { padding: 12px; gap: 12px; }
    .home-header h1 { font-size: 28px; }
    .level-grid { gap: 8px; }
    .level-btn .lvl-num { font-size: 18px; }
    .board-wrapper { padding: 8px; border-radius: 12px; }
    .info-bar { gap: 8px; font-size: 11px; }
    .info-item { padding: 3px 8px; }
    .dpad button { width: 44px; height: 44px; font-size: 18px; }
    .dpad { grid-template-columns: 44px 44px 44px; grid-template-rows: 44px 44px 44px; }
    .controls button { padding: 6px 12px; font-size: 11px; }
  }
  @media (max-width: 380px) {
    :root { --cell-size: 26px; }
    .board { gap: 1px; }
    .board-wrapper { padding: 5px; }
    .level-grid { grid-template-columns: repeat(5, 1fr); gap: 6px; }
  }
</style>
</head>
<body>

<!-- ════════ HOME PAGE ════════ -->
<div id="homePage" class="page active">
  <div class="home-header">
    <h1>🧩 走迷宫-Toobey</h1>
    <div class="tagline">Choose Your Challenge</div>
  </div>

  <div class="level-grid" id="levelGrid"></div>

  <div class="legend">
    <span><i class="dot" style="background:var(--red)"></i> 简单</span>
    <span><i class="dot" style="background:var(--orange)"></i> 中等</span>
    <span><i class="dot" style="background:var(--pink)"></i> 困难</span>
  </div>
</div>

<!-- ════════ GAME PAGE ════════ -->
<div id="gamePage" class="page">
  <button class="home-btn" id="homeBtn" title="返回主页">🏠</button>

  <div class="game-header">
    <h1>🧩 走迷宫-Toobey</h1>
  </div>

  <div class="info-bar">
    <span class="info-item level-badge" id="levelBadge">第 1 关</span>
    <span class="info-item"><span class="icon">👣</span> 步数 <strong id="moveCount">0</strong></span>
    <span class="info-item"><span class="icon">⏱️</span> 时间 <strong id="timerDisplay">0s</strong></span>
  </div>

  <div class="board-wrapper">
    <div class="board" id="board"></div>
  </div>

  <div class="controls">
    <button id="undoBtn" title="撤销 (Z)">↩ 撤销</button>
    <button id="resetBtn" title="重置 (R)">⟳ 重置</button>
    <button id="prevBtn" title="上一关 (←)">◀ 上一关</button>
    <button id="nextBtn" class="primary" title="下一关 (→)">下一关 ▶</button>
  </div>

  <div class="dpad" id="dpad">
    <button class="dpad-empty dpad-up"></button>
    <button class="dpad-up" data-dir="up" title="向上 (W/↑)">↑</button>
    <button class="dpad-empty dpad-up"></button>
    <button class="dpad-left" data-dir="left" title="向左 (A/←)">←</button>
    <button class="dpad-empty dpad-up"></button>
    <button class="dpad-right" data-dir="right" title="向右 (D/→)">→</button>
    <button class="dpad-empty dpad-up"></button>
    <button class="dpad-down" data-dir="down" title="向下 (S/↓)">↓</button>
    <button class="dpad-empty dpad-up"></button>
  </div>

  <div class="hint-bar">
    <span><kbd>↑↓←→</kbd> / <kbd>WASD</kbd> 移动</span>
    <span><kbd>Z</kbd> 撤销</span>
    <span><kbd>R</kbd> 重置</span>
  </div>
</div>

<!-- ════════ WIN MODAL ════════ -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="emoji" id="modalEmoji">🎉</div>
    <h2 id="modalTitle">通关！</h2>
    <p id="modalDesc">太棒了！</p>
    <div class="stats">
      <div><strong id="modalMoves">0</strong><span>步数</span></div>
      <div><strong id="modalTime">0s</strong><span>用时</span></div>
    </div>
    <button id="modalBtn">下一关</button>
  </div>
</div>

<canvas id="confetti-canvas"></canvas>

<script>
// ═══════════════════════════════════════════
//   LEVEL DATA
//   # = wall  ·  space = floor  S = start  E = exit
// ═══════════════════════════════════════════
const LEVELS = [
  // ── 1: 入门 (7×7) ──
  ['#######','#S#  E#','# # ###','# #   #','# ### #','#     #','#######'],
  // ── 2: 基础 (9×9) ──
  ['#########','#S      #','####### #','#     # #','# # ### #','# #     #','# #######','#      E#','#########'],
  // ── 3: 进阶 (13×13) ──
  ['#############','#S  #       #','### ####### #','# # #       #','# # # ##### #','# # #   #   #','# # # # ### #','# # # #   # #','# # # ### # #','# # # #   # #','# # ### ### #','#       #  E#','#############'],
  // ── 4: 困难 (17×17) ──
  ['#################','#S  #   #       #','### # ### # #####','#   # #   #     #','# ### # ####### #','# #   # #     # #','# # # # # ### # #','# # #   # # # # #','# # ##### # # # #','# #   #   #   # #','# # ### ### ### #','# # #   # #     #','# ### ### ##### #','#   # #       # #','### # # # ##### #','#     # #      E#','#################'],
  // ── 5: 专家 (21×21) ──
  ['#####################','#S  #   #           #','### # ### ##### ### #','# # #         # # # #','# # # ######### # # #','#   #   #     # #   #','# ##### # ### # ### #','#   # # # #   #   # #','### # # # # ### # ###','#   #   # # #   #   #','# ####### # # ##### #','#         # #     # #','########### ####### #','#     #   #         #','# # # # # ######### #','# # # # #         # #','### ### ######### # #','#   #   #       # # #','# ### ######### # # #','#               #  E#','#####################'],
  // ── 6: 大师 (25×25) ──
  ['#########################','#S      #     #       # #','####### ### ### ### # # #','# #     #   #     # # # #','# # ##### # # ##### # # #','# # #     # # #     #   #','# # # # ##### # ####### #','# # # #     # #   #   # #','# # ####### # ### # ### #','#   #     # # # # #     #','# ### ### # # # # ##### #','# #   #   # # # #     # #','# ### # ### # # ##### # #','# #   #   #   #     # # #','# # ##### # ##### ### # #','# # #   # #     # #   # #','# # # ### ##### # # ### #','#   #   # #       # #   #','##### # # # ##### # #####','#   # #   # #   # # #   #','# # # ##### # # # # # # #','# # # #   # # # # #   # #','# # # # # ### # ####### #','# #     #     #        E#','#########################'],
  // ── 7: 宗师 (29×29) ──
  ['#############################','#S  #     #         #     # #','### ### # # # ##### # ### # #','# #   # #   # #   #   #   # #','# ### ####### # # ##### ### #','#   #         # #   #   #   #','# ############### # # ### # #','#     #   #       # #   # # #','# # ### # # ### ### ### ### #','# #     # # # #   #   #   # #','# ####### # # ### ####### # #','# #     # #     #       #   #','# ##### # ##### ####### ### #','#     # #     # #     #     #','##### # # ##### # # #########','#     # #       # #         #','# ##### ############### ### #','# # #     #   #         # # #','# # # # # # # ### ####### # #','# #   # #   #     # #   #   #','# ##### ########### # # # ###','#       #     #     # # # # #','############# # ### # # # # #','#             #   #   # #   #','# ############### ##### ### #','#   #   #       #   #     # #','# # # # # ##### ### # ##### #','# #   #       #     #      E#','#############################'],
  // ── 8: 传奇 (33×33) ──

  // ── 9: 传说 (37×37) ──
  ['#####################################','#S      #                     #     #','####### # ################### ### # #','#     # #   #     #           #   # #','# # # # ### # # ### ########### ### #','# # # # #   # #   # #           #   #','# # # # # ### ### # ##### ####### ###','# # # #   # # # # #   #   #     #   #','# # ####### # # # ### # ##### ##### #','# #     #   # # #     #     #   #   #','# ### # # # # # ####### ### ### # ###','# # # #   # # #     #     #   # # # #','# # # ####### # ### ####### # # # # #','# # # #       # # #       # # # #   #','# # # # ####### # ####### ### # ### #','#   # #   #     # #     #     # #   #','# ### ### ### ### # # # ####### # ###','# #     #   # #     # # #     #   # #','# # ### ### # # ##### # # # # # ### #','# #   # # #   # #   # # # # # #   # #','##### # # ##### ### # # # # ##### # #','#     # #           # # # #       # #','# ##### # ########### ### ######### #','# #   # #   #       #   # #   # #   #','# # ### # ### ##### # # # # # # # # #','# #   # # #   #   # # # #   # #   # #','# ### # ### ### # # ### ##### # ### #','#   #       #   #           # # #   #','# # ############# ########### ### ###','# #   #         #   #       #   #   #','##### # ####### ### # ##### ### ### #','#     # #     # #   #     #   #     #','# ##### # ### # ######### # ####### #','#     #   #   #     #   # # #     # #','# ### ##### ####### # # # # # # ### #','#   #             #   #   #   #    E#','#####################################'],
  // ── 10: 终极 (41×41) ──
  ['#########################################','#S#   #       #   #       #             #','# # # # # ### # # # # ### # ##### ### # #','# # # # # #   # #   #   # # #   # #   # #','# # ### # ##### ####### # # # # ### ### #','# #     #     #   #   # # # # # #   # # #','# ####### ### ### ### # ### # # # ### # #','#       #   #   # #   #     # #   #     #','####### ##### # # # ######### ###########','#   #   #   # # # #         #           #','### # ### # # # # ######### ########### #','#   #     # # # #       #           # # #','# # ####### ### ####### # ######### # # #','# # #     #   #       #   # #   #   # # #','# # # # ##### # ##### ##### # # # ### # #','# # # #     # # #   #     #   #   #   # #','# # # ### # # ### # # # # # ####### ### #','# # # # # # #     # # # # #   #     #   #','# ### # # ######### # # ##### ### # # ###','# #   # #         # # #           # #   #','# # ### ######### # # ####### ######### #','# #     #     #   # #   #   # #       # #','# ##### ### # # ### ### # # ### ##### # #','#     # #   # #     #   # #     #   #   #','# ### # # ############### ####### # ### #','# # # # #   #             #       # # # #','# # # # ### # # ########### ####### # # #','#   # #   # # #   #   #     #   #   # # #','### # ### # # ### ### # # ### # # ### # #','#   #     # #   #   #   # #   # #     # #','# ######### ### ### ##### # ### ####### #','#   #         #   #     #   # #         #','### # # ######### ##### # ### ###########','#   # #             #   # #           # #','# ### ############### ### # ##### ### # #','# #           #       # # # #   # # # # #','# ##### ##### # ####### # # # ### # # # #','# #   # #   # # #   #   # #   #   # #   #','# # # ### # ### # # # # # ##### ### ### #','#   #     #     # #   #         #      E#','#########################################'],
];

const LEVEL_NAMES = ['入门','基础','进阶','困难','专家','大师','宗师','传奇','传说','终极'];
const LEVEL_SIZES = ['7×7','9×9','13×13','17×17','21×21','25×25','29×29','33×33','37×37','41×41'];

// Difficulty colors for level buttons
const DIFF_COLORS = [
  ['#ef4444','#f87171'],  // 1: red
  ['#ef4444','#f97316'],  // 2: red-orange
  ['#f97316','#fb923c'],  // 3: orange
  ['#f97316','#f59e0b'],  // 4: amber
  ['#f59e0b','#eab308'],  // 5: yellow
  ['#ec4899','#f472b6'],  // 6: pink
  ['#ec4899','#d946ef'],  // 7: fuchsia
  ['#d946ef','#a855f7'],  // 8: purple
  ['#a855f7','#8b5cf6'],  // 9: violet
  ['#ef4444','#ec4899'],  // 10: red-pink
];

// ═══════════════════════════════════════════
//   STATE
// ═══════════════════════════════════════════
let currentPage = 'home';
let currentLevel = 0;
let grid = [];
let playerPos = { r: 0, c: 0 };
let startPos = { r: 0, c: 0 };
let exitPos = { r: 0, c: 0 };
let trail = new Set();
let moves = 0;
let history = [];
let completedLevels = JSON.parse(localStorage.getItem('maze_completed') || '[]');
let timerInterval = null, elapsed = 0, timerRunning = false;

// DOM
const homePage = document.getElementById('homePage');
const gamePage = document.getElementById('gamePage');
const boardEl = document.getElementById('board');
const levelBadge = document.getElementById('levelBadge');
const moveCountEl = document.getElementById('moveCount');
const timerDisplay = document.getElementById('timerDisplay');
const undoBtn = document.getElementById('undoBtn');
const resetBtn = document.getElementById('resetBtn');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const homeBtn = document.getElementById('homeBtn');
const modalOverlay = document.getElementById('modalOverlay');
const modalEmoji = document.getElementById('modalEmoji');
const modalTitle = document.getElementById('modalTitle');
const modalDesc = document.getElementById('modalDesc');
const modalMoves = document.getElementById('modalMoves');
const modalTime = document.getElementById('modalTime');
const modalBtn = document.getElementById('modalBtn');
const confettiCanvas = document.getElementById('confetti-canvas');

// ═══════════════════════════════════════════
//   PAGE NAVIGATION
// ═══════════════════════════════════════════
function showHome() {
  stopTimer();
  currentPage = 'home';
  homePage.classList.add('active');
  gamePage.classList.remove('active');
  modalOverlay.classList.remove('active');
  buildLevelGrid();
}

function showGame(idx) {
  stopTimer();
  currentPage = 'game';
  homePage.classList.remove('active');
  gamePage.classList.add('active');
  loadLevel(idx);
}

homeBtn.addEventListener('click', showHome);

// ═══════════════════════════════════════════
//   HOME: BUILD LEVEL GRID
// ═══════════════════════════════════════════
function buildLevelGrid() {
  const grid = document.getElementById('levelGrid');
  grid.innerHTML = '';
  LEVELS.forEach((_, i) => {
    const btn = document.createElement('button');
    btn.className = 'level-btn' + (completedLevels.includes(i) ? ' completed' : '');
    const grad = DIFF_COLORS[i];
    btn.style.background = `linear-gradient(135deg, ${grad[0]}22, ${grad[1]}11)`;
    btn.style.borderColor = grad[0] + '66';
    btn.innerHTML = `<span class="lvl-num">${i+1}</span><span class="lvl-label">${LEVEL_NAMES[i]}</span>`;
    btn.addEventListener('click', () => showGame(i));
    grid.appendChild(btn);
  });
}

// ═══════════════════════════════════════════
//   TIMER
// ═══════════════════════════════════════════
function startTimer() {
  if (timerRunning) return;
  timerRunning = true;
  elapsed = 0;
  timerInterval = setInterval(() => { elapsed++; timerDisplay.textContent = elapsed + 's'; }, 1000);
}
function stopTimer() { timerRunning = false; clearInterval(timerInterval); timerInterval = null; }
function resetTimer() { stopTimer(); elapsed = 0; timerDisplay.textContent = '0s'; }

// ═══════════════════════════════════════════
//   LEVEL LOAD
// ═══════════════════════════════════════════
function loadLevel(idx) {
  currentLevel = idx;
  const raw = LEVELS[idx];
  grid = raw.map(row => [...row]);
  trail = new Set();
  moves = 0;
  history = [];

  for (let r = 0; r < grid.length; r++) {
    for (let c = 0; c < grid[r].length; c++) {
      if (grid[r][c] === 'S') { startPos = {r,c}; playerPos = {r,c}; grid[r][c] = ' '; }
      if (grid[r][c] === 'E') { exitPos = {r,c}; }
    }
  }
  resetTimer();
  updateUI();
  render();
  modalOverlay.classList.remove('active');
}

// ═══════════════════════════════════════════
//   GAME LOGIC
// ═══════════════════════════════════════════
const DIRS = { up:{dr:-1,dc:0}, down:{dr:1,dc:0}, left:{dr:0,dc:-1}, right:{dr:0,dc:1} };

function saveState() {
  history.push({ playerPos:{...playerPos}, trail:new Set(trail), moves });
  if (history.length > 500) history.shift();
}

function move(dir) {
  const {dr,dc} = DIRS[dir];
  const nr = playerPos.r + dr, nc = playerPos.c + dc;
  if (nr<0||nr>=grid.length||nc<0||nc>=grid[0].length) return false;
  if (grid[nr][nc]==='#') return false;

  saveState();
  trail.add(`${playerPos.r},${playerPos.c}`);
  playerPos = {r:nr, c:nc};
  moves++;
  if (!timerRunning) startTimer();
  updateUI();
  render();
  playMoveSound();

  if (nr===exitPos.r && nc===exitPos.c) {
    setTimeout(()=>showWinModal(), 250);
  }
  return true;
}

function undo() {
  if (!history.length) return;
  const s = history.pop();
  playerPos = s.playerPos; trail = s.trail; moves = s.moves;
  updateUI(); render();
}
function reset() { loadLevel(currentLevel); }

// ═══════════════════════════════════════════
//   SOUND
// ═══════════════════════════════════════════
let audioCtx = null;
function getAudioCtx() { if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); return audioCtx; }
function playMoveSound() {
  try {
    const ctx = getAudioCtx(), osc = ctx.createOscillator(), gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type='sine'; osc.frequency.value=500;
    gain.gain.setValueAtTime(.06,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.08);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime+.08);
  } catch(e){}
}
function playWinSound() {
  try {
    const ctx = getAudioCtx();
    [523,659,784,1047].forEach((f,i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);o.type='sine';o.frequency.value=f;
      const t=ctx.currentTime+i*.12;
      g.gain.setValueAtTime(.1,t);g.gain.exponentialRampToValueAtTime(.001,t+.3);
      o.start(t);o.stop(t+.3);
    });
  } catch(e){}
}

// ═══════════════════════════════════════════
//   RENDER
// ═══════════════════════════════════════════
function render() {
  const rows = grid.length, cols = grid[0].length;
  boardEl.style.gridTemplateColumns = `repeat(${cols},var(--cell-size))`;
  boardEl.style.gridTemplateRows = `repeat(${rows},var(--cell-size))`;

  let html = '';
  for (let r=0;r<rows;r++) {
    for (let c=0;c<cols;c++) {
      const ch = grid[r][c];
      const isWall = ch==='#';
      const isTrail = trail.has(`${r},${c}`);
      const isStart = (r===startPos.r && c===startPos.c);
      const isExit = (r===exitPos.r && c===exitPos.c);
      let cls = 'cell ';
      if (isWall) cls += 'cell-wall';
      else {
        cls += (r+c)%2===0 ? 'cell-floor' : 'cell-floor-alt';
        if (isTrail) cls += ' cell-trail';
      }
      if (isStart) cls += ' cell-start';
      if (isExit) cls += ' cell-exit';
      html += `<div class="${cls}"></div>`;
    }
  }
  boardEl.innerHTML = html;

  const boardRect = boardEl.getBoundingClientRect();
  const idx = playerPos.r * cols + playerPos.c;
  const cellEl = boardEl.children[idx];
  const cellRect = cellEl.getBoundingClientRect();

  const pEl = document.createElement('div');
  pEl.className = 'entity entity-player';
  pEl.style.left = `${cellRect.left-boardRect.left}px`;
  pEl.style.top = `${cellRect.top-boardRect.top}px`;
  pEl.style.width = `${cellRect.width}px`;
  pEl.style.height = `${cellRect.height}px`;
  boardEl.appendChild(pEl);
}

function updateUI() {
  levelBadge.textContent = `第 ${currentLevel+1} 关`;
  moveCountEl.textContent = moves;
  prevBtn.disabled = currentLevel===0;
  prevBtn.style.opacity = currentLevel===0 ? '.35' : '1';
}

// ═══════════════════════════════════════════
//   WIN MODAL + CONFETTI
// ═══════════════════════════════════════════
function showWinModal() {
  stopTimer();
  playWinSound();

  // Mark completed
  if (!completedLevels.includes(currentLevel)) {
    completedLevels.push(currentLevel);
    localStorage.setItem('maze_completed', JSON.stringify(completedLevels));
  }

  const isLast = currentLevel === LEVELS.length - 1;
  modalEmoji.textContent = isLast ? '🏆' : '🎉';
  modalTitle.textContent = isLast ? '全部通关！' : '通关！';
  modalDesc.textContent = isLast
    ? '恭喜你完成了全部10个关卡！你是迷宫大师！'
    : `第 ${currentLevel+1} 关已完成！`;
  modalMoves.textContent = moves;
  modalTime.textContent = elapsed + 's';
  modalBtn.textContent = isLast ? '🏠 返回主页' : '下一关 ▶';
  modalOverlay.classList.add('active');
  launchConfetti();
}

modalBtn.addEventListener('click', () => {
  modalOverlay.classList.remove('active');
  if (currentLevel >= LEVELS.length - 1) {
    showHome();
  } else {
    loadLevel(currentLevel + 1);
  }
});

function launchConfetti() {
  const canvas = confettiCanvas;
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const colors = ['#ef4444','#f97316','#fbbf24','#f472b6','#fb7185','#fca5a5','#fecaca','#eab308'];
  const pieces = Array.from({length:150},(_,i)=>({
    x:Math.random()*canvas.width, y:-20-Math.random()*canvas.height*.5,
    w:5+Math.random()*7, h:4+Math.random()*5,
    color:colors[i%colors.length],
    vx:(Math.random()-.5)*4, vy:2+Math.random()*4,
    rot:Math.random()*360, rv:(Math.random()-.5)*8, life:1,
  }));

  let frame = 0;
  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    let alive = false;
    for (const p of pieces) {
      p.x+=p.vx; p.y+=p.vy; p.vy+=.06; p.rot+=p.rv; p.life-=.003;
      if (p.life<=0||p.y>canvas.height+30) continue;
      alive = true;
      ctx.save();
      ctx.globalAlpha=Math.min(1,p.life*2);
      ctx.translate(p.x,p.y); ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle=p.color;
      ctx.beginPath(); ctx.roundRect(-p.w/2,-p.h/2,p.w,p.h,2); ctx.fill();
      ctx.restore();
    }
    frame++;
    if (alive&&frame<300) requestAnimationFrame(draw);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  draw();
}

// ═══════════════════════════════════════════
//   KEYBOARD
// ═══════════════════════════════════════════
document.addEventListener('keydown', (e) => {
  const map = { ArrowUp:'up',ArrowDown:'down',ArrowLeft:'left',ArrowRight:'right',
    w:'up',W:'up',s:'down',S:'down',a:'left',A:'left',d:'right',D:'right' };
  const dir = map[e.key];
  if (dir) { e.preventDefault(); move(dir); return; }
  if (e.key==='z'&&(e.ctrlKey||e.metaKey)) { e.preventDefault(); undo(); return; }
  if (e.key==='r'||e.key==='R') { reset(); return; }
});

// ═══════════════════════════════════════════
//   EVENTS
// ═══════════════════════════════════════════
undoBtn.addEventListener('click', undo);
resetBtn.addEventListener('click', reset);
prevBtn.addEventListener('click', () => { if (currentLevel>0) loadLevel(currentLevel-1); });
nextBtn.addEventListener('click', () => { if (currentLevel<LEVELS.length-1) loadLevel(currentLevel+1); });

document.querySelectorAll('[data-dir]').forEach(btn => {
  btn.addEventListener('click', () => move(btn.dataset.dir));
});

let touchStart = null;
document.addEventListener('touchstart', (e) => {
  const t = e.changedTouches[0]; touchStart = {x:t.clientX,y:t.clientY};
}, {passive:true});
document.addEventListener('touchend', (e) => {
  if (!touchStart) return;
  const t = e.changedTouches[0];
  const dx=t.clientX-touchStart.x, dy=t.clientY-touchStart.y;
  const ax=Math.abs(dx),ay=Math.abs(dy);
  if (Math.max(ax,ay)<30) return;
  if (ax>ay) move(dx>0?'right':'left');
  else move(dy>0?'down':'up');
  touchStart = null;
}, {passive:true});

// ═══════════════════════════════════════════
//   INIT
// ═══════════════════════════════════════════
showHome();
window.addEventListener('resize', () => { if (currentPage==='game') render(); });
</script>
